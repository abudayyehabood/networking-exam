const c=document.getElementById('quiz-container');
let l='';

if(q.lo!==l){l=q.lo;const t={LO1:'LO1: مبادئ الشبكات والبروتوكولات',LO2:'LO2: أجهزة الشبكات وعملياتها',LO3:'LO3: تصميم أنظمة الشبكات الفعالة',LO4:'LO4: تنفيذ وتشخيص أنظمة الشبكات'};const d=document.createElement('div');d.className='lo-section';d.textContent=t[l]||l;c.appendChild(d)}
const d=document.createElement('div');d.className='question';d.id='q'+i;
let h='<div class="q-header"><span class="q-num">س '+(i+1)+'</span><span class="q-topic">'+q.topic+'</span></div>';
h+='<div class="q-text">'+q.q+'</div><div class="options">';
const L=['أ','ب','ج','د'];
q.opts.forEach((o,j)=>{h+='<label id="lbl_'+i+'_'+j+'"><input type="radio" name="q'+i+'" value="'+j+'" onchange="M('+i+','+j+')"> <span>'+L[j]+') '+o+'</span></label>'});
h+='</div><div class="explanation" id="exp_'+i+'"></div>';d.innerHTML=h;c.appendChild(d)});
function M(i,j){document.getElementById('q'+i).classList.add('answered');document.querySelectorAll('#q'+i+' label').forEach(l=>l.classList.remove('selected'));document.getElementById('lbl_'+i+'_'+j).classList.add('selected');U()}
function U(){let n=0;for(let i=0;i<questions.length;i++){if(document.querySelector('input[name="q'+i+'"]:checked'))n++}document.getElementById('progress-text').textContent=n+' / 100 تمت الإجابة';document.getElementById('progress-inner').style.width=n+'%'}
function submitQuiz(){let c=0,w=0,u=0;window.scrollTo({top:0,behavior:'smooth'});
for(let i=0;i<questions.length;i++){const qD=document.getElementById('q'+i);const s=document.querySelector('input[name="q'+i+'"]:checked');const e=document.getElementById('exp_'+i);
if(!s){u++;qD.classList.add('wrong');e.style.display='block';e.innerHTML='✗ <strong>لم تتم الإجابة.</strong> الإجابة الصحيحة: <strong>'+['أ','ب','ج','د'][questions[i].ans]+') '+questions[i].opts[questions[i].ans]+'</strong>';document.getElementById('lbl_'+i+'_'+questions[i].ans).classList.add('correct-answer');continue}
const ch=parseInt(s.value);
if(ch===questions[i].ans){c++;qD.classList.add('correct');qD.classList.remove('wrong');document.getElementById('lbl_'+i+'_'+ch).classList.add('correct-answer');e.style.display='block';e.innerHTML='✓ صحيح!'}
else{w++;qD.classList.add('wrong');qD.classList.remove('correct');document.getElementById('lbl_'+i+'_'+ch).classList.add('wrong-answer');document.getElementById('lbl_'+i+'_'+questions[i].ans).classList.add('correct-answer');e.style.display='block';e.innerHTML='✗ <strong>خطأ.</strong> اخترت '+['أ','ب','ج','د'][ch]+'. الصحيح: <strong>'+['أ','ب','ج','د'][questions[i].ans]+') '+questions[i].opts[questions[i].ans]+'</strong>'}}
document.querySelectorAll('input[type="radio"]').forEach(r=>r.disabled=true);document.getElementById('submit-btn').disabled=true;
const t=questions.length;const sc=Math.round((c/t)*100);const rB=document.getElementById('result-box');const sD=document.getElementById('score-display');const rD=document.getElementById('result-detail');
sD.textContent=c+' / '+t+'  ('+sc+'%)';sD.className='score '+(sc>=50?'score-pass':'score-fail');
let det='صحيح: '+c+'  |  خطأ: '+w+'  |  لم تتم الإجابة: '+u;if(sc>=70)det+='\nممتاز — فهم قوي لمفاهيم الشبكات.';else if(sc>=50)det+='\nناجح — راجع الأسئلة المظللة بالأحمر وأعد المحاولة.';else det+='\nيحتاج تحسين — ركز على الأسئلة المظللة بالأحمر وأعد المحاولة.';
rD.textContent=det;rB.style.display='block';U()}
function resetQuiz(){document.querySelectorAll('input[type="radio"]').forEach(r=>{r.disabled=false;r.checked=false});document.querySelectorAll('.question').forEach(q=>q.classList.remove('wrong','correct','answered'));document.querySelectorAll('.options label').forEach(l=>l.classList.remove('selected','correct-answer','wrong-answer'));document.querySelectorAll('.explanation').forEach(e=>{e.style.display='none';e.innerHTML=''});document.getElementById('submit-btn').disabled=false;document.getElementById('result-box').style.display='none';document.getElementById('progress-text').textContent='0 / 100 تمت الإجابة';document.getElementById('progress-inner').style.width='0%';window.scrollTo({top:0,behavior:'smooth'})}
