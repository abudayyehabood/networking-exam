// ── BUILD QUIZ ──────────────────────────────────────────────────
const container = document.getElementById('quiz-container');
let currentLO = '';

questions.forEach((q, i) => {
  if (q.lo !== currentLO) {
    currentLO = q.lo;
    const titles = {
      'LO1': 'LO1: Networking Principles & Protocols',
      'LO2': 'LO2: Networking Devices & Operations',
      'LO3': 'LO3: Designing Efficient Networked Systems',
      'LO4': 'LO4: Implement & Diagnose Networked Systems'
    };
    const div = document.createElement('div');
    div.className = 'lo-section';
    div.textContent = titles[currentLO] || currentLO;
    container.appendChild(div);
  }

  const qDiv = document.createElement('div');
  qDiv.className = 'question';
  qDiv.id = 'q' + i;

  let html = '<div class="q-header"><span class="q-num">Q' + (i+1) + '</span><span class="q-topic">' + q.topic + '</span></div>';
  html += '<div class="q-text">' + q.q + '</div>';
  html += '<div class="options">';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, j) => {
    html += '<label id="lbl_' + i + '_' + j + '"><input type="radio" name="q' + i + '" value="' + j + '" onchange="markAnswered(' + i + ',' + j + ')"> <span>' + letters[j] + ') ' + opt + '</span></label>';
  });
  html += '</div>';
  html += '<div class="explanation" id="exp_' + i + '"></div>';
  qDiv.innerHTML = html;
  container.appendChild(qDiv);

function markAnswered(qIdx, optIdx) {
  const qDiv = document.getElementById('q' + qIdx);
  qDiv.classList.add('answered');
  // Remove old selection styling
  qDiv.querySelectorAll('label').forEach(l => l.classList.remove('selected'));
  document.getElementById('lbl_' + qIdx + '_' + optIdx).classList.add('selected');
  updateProgress();
}

function updateProgress() {
  let count = 0;
  for (let i = 0; i < questions.length; i++) {
    const selected = document.querySelector('input[name="q' + i + '"]:checked');
    if (selected) count++;
  }
  document.getElementById('progress-text').textContent = count + ' / 100 answered';
  document.getElementById('progress-inner').style.width = count + '%';
}

function submitQuiz() {
  let correct = 0;
  let wrong = 0;
  let unanswered = 0;

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });

  for (let i = 0; i < questions.length; i++) {
    const qDiv = document.getElementById('q' + i);
    const selected = document.querySelector('input[name="q' + i + '"]:checked');
    const expDiv = document.getElementById('exp_' + i);

    if (!selected) {
      unanswered++;
      qDiv.classList.add('wrong');
      expDiv.style.display = 'block';
      expDiv.innerHTML = '✗ <strong>Unanswered.</strong> Correct: <strong>' + ['A','B','C','D'][questions[i].ans] + ') ' + questions[i].opts[questions[i].ans] + '</strong>';
      // Highlight correct answer
      document.getElementById('lbl_' + i + '_' + questions[i].ans).classList.add('correct-answer');
      continue;
    }

    const chosen = parseInt(selected.value);

    if (chosen === questions[i].ans) {
      correct++;
      qDiv.classList.add('correct');
      qDiv.classList.remove('wrong');
      document.getElementById('lbl_' + i + '_' + chosen).classList.add('correct-answer');
      expDiv.style.display = 'block';
      expDiv.innerHTML = '✓ Correct!';
    } else {
      wrong++;
      qDiv.classList.add('wrong');
      qDiv.classList.remove('correct');
      document.getElementById('lbl_' + i + '_' + chosen).classList.add('wrong-answer');
      document.getElementById('lbl_' + i + '_' + questions[i].ans).classList.add('correct-answer');
      expDiv.style.display = 'block';
      expDiv.innerHTML = '✗ <strong>Wrong.</strong> You chose ' + ['A','B','C','D'][chosen] + '. Correct: <strong>' + ['A','B','C','D'][questions[i].ans] + ') ' + questions[i].opts[questions[i].ans] + '</strong>';
    }
  }

  // Disable all radios
  document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
  document.getElementById('submit-btn').disabled = true;

  // Show result
  const total = questions.length;
  const score = Math.round((correct / total) * 100);
  const resultBox = document.getElementById('result-box');
  const scoreDisplay = document.getElementById('score-display');
  const resultDetail = document.getElementById('result-detail');

  scoreDisplay.textContent = correct + ' / ' + total + '  (' + score + '%)';
  scoreDisplay.className = 'score ' + (score >= 50 ? 'score-pass' : 'score-fail');

  let detail = 'Correct: ' + correct + '  |  Wrong: ' + wrong + '  |  Unanswered: ' + unanswered;
  if (score >= 70) detail += '\nExcellent — strong understanding of networking concepts.';
  else if (score >= 50) detail += '\nPass — review the red-highlighted questions and retake.';
  else detail += '\nNeeds improvement — focus on the red-highlighted areas and retake.';

  resultDetail.textContent = detail;
  resultBox.style.display = 'block';
  updateProgress();
}

function resetQuiz() {
  document.querySelectorAll('input[type="radio"]').forEach(r => { r.disabled = false; r.checked = false; });
  document.querySelectorAll('.question').forEach(q => { q.classList.remove('wrong','correct','answered'); });
  document.querySelectorAll('.options label').forEach(l => { l.classList.remove('selected','correct-answer','wrong-answer'); });
  document.querySelectorAll('.explanation').forEach(e => { e.style.display = 'none'; e.innerHTML = ''; });
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('progress-text').textContent = '0 / 100 answered';
  document.getElementById('progress-inner').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Keyboard navigation: 1-4 to select option after focusing a question
document.addEventListener('keydown', function(e) {
  if (e.key >= '1' && e.key <= '4') {
    const focused = document.activeElement;
    if (focused && focused.closest('.question')) {
      const qDiv = focused.closest('.question');
      const inputs = qDiv.querySelectorAll('input[type="radio"]');
      if (inputs.length >= parseInt(e.key) && !inputs[0].disabled) {
        inputs[parseInt(e.key)-1].checked = true;
        const qIdx = parseInt(qDiv.id.substring(1));
        markAnswered(qIdx, parseInt(e.key)-1);
      }
    }
  }
});
</script>
